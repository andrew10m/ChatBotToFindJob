<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умный конструктор физических моделей</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Умный конструктор физических моделей</h1>
        <textarea id="task-input" placeholder="Введите описание задачи..."></textarea>
        <button id="submit-task">Обработать</button>

        <div id="visualization-area">
            <div id="canvas-container"></div>
        </div>

        <div id="parameters-area">
            <h2>Параметры:</h2>
            <div>
                <label for="mass">Масса (кг):</label>
                <input type="number" id="mass" step="any">
            </div>
            <div>
                <label for="angle">Угол (градусы):</label>
                <input type="number" id="angle" step="any">
            </div>
            <div>
                <label for="speed">Скорость (м/с):</label>
                <input type="number" id="speed" step="any">
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="script.js"></script>
</body>
</html>
